<!DOCTYPE html>
<html>
<head>
  <title>INFALLIBLE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <h1>HOUSE OF INFALLIBLE</h1>
  <nav>
    <a href="#about">About</a>
    <a href="#products">Products</a>
    <a href="#contact">Contact</a>
  </nav>
</header>

<section class="hero">
  <div class="overlay">
    <h2>Where Tradition Meets Contemporary Elegance</h2>
    <p>Premium clothing for every occasion</p>
  </div>
</section>

<section id="products" class="products">
  <h2>Products</h2>
  <div id="product-list"></div>
</section>

<script>
async function loadProducts() {
  const productFolder = [
    "suit-1.md"
  ];

  const container = document.getElementById("product-list");

  for (const file of productFolder) {
    const response = await fetch(`/products/${file}`);
    const text = await response.text();

    const title = text.match(/title:\s*"?([^"\n]+)"?/)[1];
    const category = text.match(/category:\s*"?([^"\n]+)"?/)[1];
    const price = text.match(/price:\s*"?([^"\n]+)"?/)[1];
    const image = text.match(/image:\s*"?([^"\n]+)"?/)[1];

    container.innerHTML += `
      <div class="product-card">
        <img src="${image}" alt="${title}">
        <h3>${title}</h3>
        <p>${category}</p>
        <p>₹${price}</p>
      </div>
    `;
  }
}

loadProducts();
</script>

<section id="about" class="about">
  <h2>About INFALLIBLE</h2>
  <p>INFALLIBLE brings elegant fashion with a blend of traditional and modern designs.</p>
</section>

<section id="contact" class="contact">
  <h2>Contact</h2>
  <p>Phone: +91 9876543210</p>
  <p>Email: infallible@example.com</p>
</section>

</body>
</html>
